name: Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type checking
        run: bun run lint

      - name: Run tests
        run: bun run test

  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Extract version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: extract-version
        run: |
          # Extract version from tag (remove 'v' prefix)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Tag version: $TAG_VERSION"
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "is_tag=true" >> $GITHUB_OUTPUT

      - name: Update package.json version from tag
        if: steps.extract-version.outputs.is_tag == 'true'
        run: |
          # Update package.json with the extracted version using jq
          jq --arg version "${{ steps.extract-version.outputs.version }}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "Updated package.json version to ${{ steps.extract-version.outputs.version }}"
          cat package.json | grep '"version"'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Check if version is already published
        if: steps.extract-version.outputs.is_tag == 'true'
        id: check-version
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "Local version: $LOCAL_VERSION"
          echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          
          # Check if version exists on npm
          if npm view code-assistant-mcp@$LOCAL_VERSION version &>/dev/null; then
            echo "Version $LOCAL_VERSION already published to npm"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $LOCAL_VERSION not found on npm"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.extract-version.outputs.is_tag == 'true' && steps.check-version.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        if: steps.extract-version.outputs.is_tag == 'true'
        run: |
          if [ "${{ steps.check-version.outputs.should_publish }}" == "true" ]; then
            echo "✅ Published version ${{ steps.check-version.outputs.version }} to npm"
          else
            echo "⏭️ Skipped publishing - version ${{ steps.check-version.outputs.version }} already exists"
          fi

      - name: Build summary (non-tag)
        if: steps.extract-version.outputs.is_tag != 'true'
        run: |
          echo "✅ Build completed successfully (tag push required for publishing)"